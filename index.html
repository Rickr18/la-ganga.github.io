<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Ganga – Multi-Stream Dashboard</title>
  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --neon:   #53fc18;
      --black:  #000000;
      --darker: #07070d;
      --dark:   #0d0d18;
      --card:   #12121e;
      --card2:  #1a1a2e;
      --border: #252540;
      --muted:  #6b7280;
      --muted2: #8892a4;
      --white:  #eef0f8;
      --red:    #ef4444;
      --yellow: #facc15;
      --blue:   #3b82f6;
      --live:   #22c55e;
    }
    html, body { height: 100%; overflow: hidden; background: var(--darker); }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: var(--white); }
    #root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
    input, select, textarea { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--darker); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--neon); }

    @keyframes pulse-live {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,.75); }
      50%       { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes glow-pulse {
      0%, 100% { text-shadow: 0 0 8px var(--neon), 0 0 22px rgba(83,252,24,.35); }
      50%       { text-shadow: 0 0 18px var(--neon), 0 0 48px rgba(83,252,24,.6); }
    }

    .dot-live { animation: pulse-live 1.8s infinite; }
    .glow      { animation: glow-pulse 3s ease-in-out infinite; }
    .fade-in   { animation: fadeIn .25s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef, createContext, useContext, useMemo, useReducer } = React;

    /* ═══════════════════════════════════════════════════════
       CONSTANTS & DEFAULTS
    ═══════════════════════════════════════════════════════ */
    const LS_KEY = 'laganga_v6';
    const KICK_PLAYER = id => `https://player.kick.com/${id}`;
    const KICK_CHAT   = id => `https://kick.com/${id}/chatroom`;
    const KICK_LINK   = id => `https://kick.com/${id}`;

    // Kick OAuth2 – Client ID (implicit / token flow, no secret needed on the frontend)
    const KICK_CLIENT_ID  = '01KK5HRDE7D8XP14D70CYRH407';
    // App name shown in the "connected" badge (matches the registered Kick app)
    const KICK_APP_NAME   = 'laganga';

    // Leandro = La Sapa. Su canal en Kick es "lasapaaaaa"
    const DEFAULT_STREAMERS = [
      { id:'westcol',    name:'Westcol',  color:'#53fc18', avatar:'🟢' },
      { id:'willito',    name:'Willito',  color:'#facc15', avatar:'🟡' },
      { id:'lasapaaaaa', name:'Leandro',  color:'#3b82f6', avatar:'🔵' },
      { id:'chanty',     name:'Chanty',   color:'#ec4899', avatar:'🩷' },
      { id:'samulx',     name:'Samulx',   color:'#a855f7', avatar:'🟣' },
      { id:'lonche',     name:'Lonche',   color:'#f97316', avatar:'🟠' },
    ];

    // Fixed La Ganga crew tags (non-editable for base streamers)
    const GANG_TAGS = {
      'westcol':    'W Reals',
      'willito':    'WAKA',
      'lonche':     'FES',
      'chanty':     'JP',
      'samulx':     'PTG',
      'lasapaaaaa': 'CDLS',
    };

    // Compute position/size of a cinema slot within the viewport
    function getCinemaRect(index, total) {
      const BAR = 44;
      if (total === 1) return { top: BAR, left: 0, right: 0, bottom: 0 };
      if (total === 2) return {
        top: BAR, bottom: 0,
        ...(index === 0 ? { left: 0, right: '50%' } : { left: '50%', right: 0 }),
      };
      // 3–4: 2-column grid
      if (total <= 4) {
        const COLS = 2, ROWS = Math.ceil(total / COLS);
        const col = index % COLS, row = Math.floor(index / COLS);
        return {
          top:    `calc(${BAR}px + ${row} * (100vh - ${BAR}px) / ${ROWS})`,
          left:   `${col * 50}%`,
          width:  '50%',
          height: `calc((100vh - ${BAR}px) / ${ROWS})`,
        };
      }
      // 5–6: 3-column grid
      const COLS = 3, ROWS = Math.ceil(total / COLS);
      const col = index % COLS, row = Math.floor(index / COLS);
      return {
        top:    `calc(${BAR}px + ${row} * (100vh - ${BAR}px) / ${ROWS})`,
        left:   `${Math.floor(col * 100 / COLS)}%`,
        width:  `${Math.floor(100 / COLS)}%`,
        height: `calc((100vh - ${BAR}px) / ${ROWS})`,
      };
    }

    const GRID_CLASSES = {
      1: { cols:'1fr',           rows:'1fr'      },
      2: { cols:'1fr 1fr',       rows:'1fr'      },
      3: { cols:'1fr 1fr',       rows:'1fr 1fr'  },
      4: { cols:'1fr 1fr',       rows:'1fr 1fr'  },
      5: { cols:'1fr 1fr 1fr',   rows:'1fr 1fr'  },
      6: { cols:'1fr 1fr 1fr',   rows:'1fr 1fr'  },
    };

    function getGridStyle(n, isMobile) {
      if (isMobile) {
        // On mobile, stack all streams vertically
        return { display:'grid', gridTemplateColumns:'1fr', gridTemplateRows:`repeat(${n}, minmax(180px, 1fr))`, width:'100%', height:'100%', gap:'3px', overflowY:'auto' };
      }
      const g = GRID_CLASSES[Math.min(Math.max(n,1),6)];
      return { display:'grid', gridTemplateColumns:g.cols, gridTemplateRows:g.rows, width:'100%', height:'100%', gap:'3px' };
    }

    /* ═══════════════════════════════════════════════════════
       MOBILE HOOK
    ═══════════════════════════════════════════════════════ */
    function useIsMobile(breakpoint) {
      const bp = breakpoint || 768;
      const [isMobile, setIsMobile] = useState(() => window.innerWidth <= bp);
      useEffect(() => {
        function onResize() { setIsMobile(window.innerWidth <= bp); }
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, [bp]);
      return isMobile;
    }

    /* ═══════════════════════════════════════════════════════
       PKCE HELPERS (OAuth 2.0 Authorization Code + PKCE)
    ═══════════════════════════════════════════════════════ */
    function generateCodeVerifier() {
      const array = new Uint8Array(32);
      crypto.getRandomValues(array);
      return btoa(Array.from(array, b => String.fromCharCode(b)).join(''))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    async function generateCodeChallenge(verifier) {
      const encoder = new TextEncoder();
      const data = encoder.encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return btoa(Array.from(new Uint8Array(digest), b => String.fromCharCode(b)).join(''))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    // Returns the canonical redirect URI for this app.
    // Strips trailing index.html and ensures a trailing slash so the URI is
    // identical regardless of how the URL was accessed (with or without index.html).
    // This value MUST be registered in the Kick developer portal as the Redirect URI.
    function getOAuthRedirectUri() {
      let pathname = window.location.pathname.replace(/\/index\.html$/, '');
      if (!pathname.endsWith('/')) pathname += '/';
      return window.location.origin + pathname;
    }

    /* ═══════════════════════════════════════════════════════
       STATE MANAGEMENT
    ═══════════════════════════════════════════════════════ */
    const defaultState = {
      streamers:       DEFAULT_STREAMERS,
      active:          [],
      chatOpen:        false,
      chatChannel:     '',
      webhookUrl:      '',
      webhookMode:     'all',
      accent:          '#53fc18',
      logoText:        'LA GANGA',
      subtitle:        'Multi-Stream Dashboard',
      pageTitle:       'La Ganga – Multi-Stream Dashboard',
      kickAccessToken: '',
      kickTokenExpiry: 0,
      milestoneGoal:   10000,
    };

    function loadState() {
      try {
        // Support migration from old storage keys
        const raw = localStorage.getItem(LS_KEY)
          || localStorage.getItem('laganga_v5')
          || localStorage.getItem('laganga_v4');
        const kickToken = localStorage.getItem('kick_token') || '';
        if (!raw) return { ...defaultState, kickAccessToken: kickToken, streamers: DEFAULT_STREAMERS };
        const saved = JSON.parse(raw);
        const merged = { ...defaultState, ...saved };
        // Sync kick_token from dedicated localStorage key if not in main storage
        if (!merged.kickAccessToken && kickToken) merged.kickAccessToken = kickToken;
        if (Array.isArray(merged.streamers) && merged.streamers.length > 0) {
          // Remove legacy "leandro" entry and fix name for "lasapaaaaa"
          merged.streamers = merged.streamers
            .filter(s => s.id !== 'leandro')
            .map(s => s.id === 'lasapaaaaa' ? { ...s, name: 'Leandro', color: s.color || '#3b82f6' } : s);
          if (merged.streamers.length === 0) merged.streamers = DEFAULT_STREAMERS;
        } else {
          merged.streamers = DEFAULT_STREAMERS;
        }
        return merged;
      } catch { return defaultState; }
    }

    function saveState(s) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {}
    }

    /* ═══════════════════════════════════════════════════════
       KICK API – real live status (oficial v2 + fallback v1)
    ═══════════════════════════════════════════════════════ */
    // Official Kick API v2 endpoint
    const KICK_API_V2 = slug => `https://api.kick.com/public/v1/channels?broadcaster_user_login=${slug}`;
    // Fallback: public unofficial v1 endpoint
    const KICK_API_V1 = slug => `https://kick.com/api/v1/channels/${slug}`;

    function formatUptime(createdAt) {
      if (!createdAt) return '';
      try {
        const diff = Math.floor((Date.now() - new Date(createdAt)) / 1000);
        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);
        return h > 0 ? `${h}h ${m}m` : `${m}m`;
      } catch { return ''; }
    }

    async function fetchStreamData(channelName, accessToken) {
      // Try official API v2 first (with or without token)
      try {
        const headers = { Accept: 'application/json' };
        if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;
        const res = await fetch(KICK_API_V2(channelName), { headers, cache: 'no-store' });
        if (res.ok) {
          const data = await res.json();
          // v2 returns { data: [ channelObject ] }
          const ch = data && Array.isArray(data.data) && data.data[0];
          if (ch) {
            const ls = ch.livestream || ch.stream || null;
            return {
              online:    ls != null && (ls.is_live !== false),
              viewers:   (ls && (ls.viewer_count || ls.viewers)) || 0,
              category:  (ls && ls.category && ls.category.name) || (ch.category && ch.category.name) || '',
              title:     (ls && (ls.session_title || ls.title)) || '',
              uptime:    ls ? formatUptime(ls.created_at || ls.started_at) : '',
              followers: ch.followers_count || 0,
              error:     false,
            };
          }
        }
      } catch {}

      // Fallback to unofficial v1
      try {
        const res = await fetch(KICK_API_V1(channelName), {
          headers: { Accept: 'application/json' },
          cache: 'no-store',
        });
        if (!res.ok) return { online: false, viewers: 0, category: '', title: '', uptime: '', followers: 0, error: false };
        const data = await res.json();
        const ls = data && data.livestream;
        return {
          online:    ls != null,
          viewers:   (ls && ls.viewer_count) || 0,
          category:  (ls && ls.categories && ls.categories[0] && ls.categories[0].name) || '',
          title:     (ls && ls.session_title) || '',
          uptime:    ls ? formatUptime(ls.created_at) : '',
          followers: (data && data.followers_count) || 0,
          error:     false,
        };
      } catch {
        return { online: false, viewers: 0, category: '', title: '', uptime: '', followers: 0, error: true };
      }
    }

    function fmtNum(n) {
      if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
      if (n >= 1000)    return (n/1000).toFixed(1)+'K';
      return String(n);
    }

    /* ═══════════════════════════════════════════════════════
       CONTEXT
    ═══════════════════════════════════════════════════════ */
    const AppCtx = createContext(null);
    function useApp() { return useContext(AppCtx); }

    function AppProvider({ children }) {
      const [state, setState] = useState(() => loadState());
      const [toast, setToast] = useState({ msg:'', color:'', show:false });
      const [cinemaIds, setCinemaIds] = useState([]);
      const [muteAll, setMuteAll] = useState(false);
      const [showAdmin, setShowAdmin] = useState(false);
      const [showDiscord, setShowDiscord] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [statusMap, setStatusMap] = useState({});
      const [apiLoading, setApiLoading] = useState(false);
      const toastRef = useRef(null);

      // persist whenever state changes
      useEffect(() => { saveState(state); }, [state]);

      // update page title
      useEffect(() => {
        document.title = state.pageTitle || 'La Ganga – Dashboard';
      }, [state.pageTitle]);

      // Handle OAuth2 callback: supports PKCE full-page redirect (code in query params)
      // and legacy implicit grant (token in URL hash).
      useEffect(() => {
        // PKCE flow: authorization code returned as ?code=XXX&state=YYY after full-page redirect
        const searchParams = new URLSearchParams(window.location.search);
        const code       = searchParams.get('code');
        const stateParam = searchParams.get('state');
        if (code) {
          // Clean the URL immediately so the code is not visible or reused on refresh
          history.replaceState(null, '', window.location.pathname);

          const savedState  = localStorage.getItem('oauth_state');
          const verifier    = localStorage.getItem('pkce_verifier');
          const redirectUri = localStorage.getItem('oauth_redirect_uri') || getOAuthRedirectUri();
          localStorage.removeItem('pkce_verifier');
          localStorage.removeItem('oauth_state');
          localStorage.removeItem('oauth_redirect_uri');

          if (savedState && stateParam !== savedState) {
            setTimeout(() => showToast('⚠️ Error de seguridad OAuth (state mismatch)', '#ef4444'), 100);
            return;
          }
          if (!verifier) {
            setTimeout(() => showToast('⚠️ Error en flujo OAuth: verifier no encontrado', '#ef4444'), 100);
            return;
          }

          // Exchange authorization code for access token (PKCE)
          (async () => {
            try {
              const body = new URLSearchParams({
                grant_type:    'authorization_code',
                code,
                client_id:     KICK_CLIENT_ID,
                code_verifier: verifier,
                redirect_uri:  redirectUri,
              });
              const res = await fetch('https://id.kick.com/oauth/token', {
                method:  'POST',
                headers: {
                  'Content-Type': 'application/x-www-form-urlencoded',
                  'Accept':       'application/json',
                },
                body: body.toString(),
              });
              if (!res.ok) {
                let errMsg = `HTTP ${res.status}`;
                try {
                  const errText = await res.text();
                  try {
                    const errJson = JSON.parse(errText);
                    errMsg = errJson.error_description || errJson.error || errMsg;
                  } catch {
                    if (errText && errText.length < 200) errMsg = errText;
                  }
                } catch {}
                setTimeout(() => showToast(`⚠️ Error OAuth: ${errMsg}`, '#ef4444'), 100);
                return;
              }
              const data      = await res.json();
              const token     = data.access_token;
              const expiresIn = data.expires_in || 0;
              const expiry    = expiresIn > 0 ? Date.now() + expiresIn * 1000 : 0;
              localStorage.setItem('kick_token', token);
              setState(s => ({ ...s, kickAccessToken: token, kickTokenExpiry: expiry }));
              setTimeout(() => showToast('✅ Conectado a Kick con OAuth2'), 100);
            } catch {
              setTimeout(() => showToast('⚠️ Error de red al obtener token OAuth', '#ef4444'), 100);
            }
          })();
          return;
        }

        // Legacy implicit grant: access_token returned in URL hash
        const hash = window.location.hash;
        if (!hash) return;
        const params    = new URLSearchParams(hash.slice(1));
        const token     = params.get('access_token');
        const expiresIn = parseInt(params.get('expires_in') || '0', 10);
        if (token) {
          const expiry = expiresIn > 0 ? Date.now() + expiresIn * 1000 : 0;
          localStorage.setItem('kick_token', token);
          history.replaceState(null, '', window.location.pathname + window.location.search);
          setState(s => ({ ...s, kickAccessToken: token, kickTokenExpiry: expiry }));
          setTimeout(() => showToast('✅ Conectado a Kick con OAuth2'), 100);
        }
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      // fetch real Kick live status for all streamers
      const refreshStatuses = useCallback(async () => {
        if (!state.streamers || !state.streamers.length) return;
        setApiLoading(true);
        // Use stored OAuth token if still valid
        const token = (state.kickAccessToken && (!state.kickTokenExpiry || Date.now() < state.kickTokenExpiry))
          ? state.kickAccessToken : '';
        const entries = await Promise.all(
          state.streamers.map(async s => [s.id, await fetchStreamData(s.id, token)])
        );
        setStatusMap(Object.fromEntries(entries));
        setApiLoading(false);
      }, [state.streamers, state.kickAccessToken, state.kickTokenExpiry]);

      useEffect(() => {
        refreshStatuses();
        const t = setInterval(refreshStatuses, 45000);
        return () => clearInterval(t);
      }, [refreshStatuses]);

      // apply accent color CSS variable
      useEffect(() => {
        document.documentElement.style.setProperty('--neon', state.accent || '#53fc18');
      }, [state.accent]);

      function showToast(msg, color) {
        setToast({ msg, color: color || state.accent, show: true });
        clearTimeout(toastRef.current);
        toastRef.current = setTimeout(() => setToast(t => ({ ...t, show:false })), 3000);
      }

      function addStream(id) {
        id = id.toLowerCase().trim();
        if (!id) return;
        if (state.active.includes(id)) { showToast(`${id} ya está en el grid`, '#facc15'); return; }
        if (state.active.length >= 6)  { showToast('Máximo 6 streams simultáneos', '#ef4444'); return; }
        setState(s => ({ ...s, active: [...s.active, id] }));
        showToast(`▶ ${id} añadido al grid`);
      }

      function removeStream(id) {
        setState(s => ({ ...s, active: s.active.filter(x => x !== id) }));
      }

      function toggleStream(id) {
        if (state.active.includes(id)) removeStream(id);
        else addStream(id);
      }

      function clearStreams() {
        setState(s => ({ ...s, active: [] }));
        showToast('Grid limpiado', '#ef4444');
      }

      function openChat(channelId) {
        const ch = channelId || state.streamers[0]?.id || '';
        setState(s => ({ ...s, chatOpen: true, chatChannel: ch }));
      }
      function closeChat() { setState(s => ({ ...s, chatOpen: false })); }
      function setChatChannel(ch) { setState(s => ({ ...s, chatChannel: ch })); }

      function enterCinema(id) {
        setCinemaIds(prev => prev.includes(id) ? prev : [...prev, id]);
      }
      function exitCinema(id) {
        if (id) setCinemaIds(prev => prev.filter(x => x !== id));
        else    setCinemaIds([]);
      }
      function toggleCinema(id) {
        setCinemaIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      }
      function toggleMuteAll() { setMuteAll(v => !v); }

      function updateState(partial) { setState(s => ({ ...s, ...partial })); }
      function addStreamer(streamer) {
        setState(s => ({ ...s, streamers: [...s.streamers, streamer] }));
      }
      function removeStreamer(id) {
        setState(s => ({ ...s, streamers: s.streamers.filter(x => x.id !== id), active: s.active.filter(x => x !== id) }));
      }
      function updateStreamer(id, partial) {
        setState(s => ({ ...s, streamers: s.streamers.map(x => x.id === id ? { ...x, ...partial } : x) }));
      }
      function resetStorage() {
        localStorage.removeItem(LS_KEY);
        localStorage.removeItem('laganga_v5');
        localStorage.removeItem('laganga_v4');
        setState({ ...defaultState, streamers: DEFAULT_STREAMERS });
        showToast('Datos borrados. Recargando…', '#ef4444');
        setTimeout(() => window.location.reload(), 1500);
      }
      function exportConfig() {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'laganga-config.json';
        a.click();
      }
      function importConfig(json) {
        try {
          const data = JSON.parse(json);
          setState(s => ({ ...s, ...data }));
          showToast('Configuración importada ✓');
        } catch { showToast('JSON inválido', '#ef4444'); }
      }

      async function sendDiscordNotification(streamerId, online) {
        const url = state.webhookUrl;
        if (!url || !url.startsWith('https://discord.com/api/webhooks/')) return;
        const s = state.streamers.find(x => x.id === streamerId) || { name: streamerId };
        const accentColor = parseInt((state.accent || '#53fc18').slice(1), 16);
        const body = {
          embeds: [{
            title: online ? `🟢 ${s.name} está EN VIVO` : `⚫ ${s.name} se fue Offline`,
            description: online
              ? `**${s.name}** acaba de conectarse en Kick!\n${KICK_LINK(streamerId)}`
              : `**${s.name}** terminó su stream.`,
            color: online ? accentColor : 0x6b7280,
            timestamp: new Date().toISOString(),
            footer: { text: 'La Ganga Dashboard' },
          }],
        };
        try {
          await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
          showToast(`Notificación enviada: ${s.name}`);
        } catch { showToast('Error al enviar notificación', '#ef4444'); }
      }

      async function testWebhook(url) {
        if (!url || !url.startsWith('https://discord.com/api/webhooks/')) {
          showToast('URL de webhook inválida', '#ef4444'); return;
        }
        const accentColor = parseInt((state.accent || '#53fc18').slice(1), 16);
        const body = {
          embeds:[{
            title:'✅ Test – La Ganga Dashboard',
            description:'El webhook funciona correctamente. ¡Las alertas llegarán a Discord!',
            color: accentColor,
            timestamp: new Date().toISOString(),
            footer: { text: 'La Ganga Dashboard' },
          }],
        };
        try {
          const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
          if (r.ok || r.status === 204) showToast('✅ Webhook OK – revisa Discord');
          else showToast(`Error ${r.status}`, '#ef4444');
        } catch { showToast('Error de red al probar webhook', '#ef4444'); }
      }

      async function initiateKickOAuth() {
        try {
          const codeVerifier  = generateCodeVerifier();
          const codeChallenge = await generateCodeChallenge(codeVerifier);
          const oauthState    = generateCodeVerifier(); // random state for CSRF protection

          // Normalize redirect URI: strip trailing index.html, ensure trailing slash.
          // This must exactly match the Redirect URI registered in the Kick developer portal.
          const redirectUri = getOAuthRedirectUri();

          // Store PKCE state in localStorage so it survives the full-page redirect to Kick
          localStorage.setItem('pkce_verifier',      codeVerifier);
          localStorage.setItem('oauth_state',        oauthState);
          localStorage.setItem('oauth_redirect_uri', redirectUri);

          const url = 'https://id.kick.com/oauth/authorize'
            + '?response_type=code'
            + '&client_id='             + KICK_CLIENT_ID
            + '&redirect_uri='          + encodeURIComponent(redirectUri)
            + '&scope=user%3Aread%20chat%3Awrite'
            + '&state='                 + oauthState
            + '&code_challenge='        + codeChallenge
            + '&code_challenge_method=S256';

          // Full-page redirect (standard PKCE flow for SPAs — no popup needed)
          window.location.href = url;
        } catch {
          showToast('⚠️ Error al iniciar OAuth', '#ef4444');
        }
      }

      function disconnectKickOAuth() {
        setState(s => ({ ...s, kickAccessToken: '', kickTokenExpiry: 0 }));
        localStorage.removeItem('kick_token');
        showToast('Desconectado de Kick OAuth');
      }

      const value = {
        state, updateState,
        addStream, removeStream, toggleStream, clearStreams,
        openChat, closeChat, setChatChannel,
        cinemaIds, enterCinema, exitCinema, toggleCinema,
        muteAll, toggleMuteAll,
        showAdmin, setShowAdmin,
        showDiscord, setShowDiscord,
        sidebarOpen, setSidebarOpen,
        statusMap, apiLoading, refreshStatuses,
        toast,
        showToast,
        addStreamer, removeStreamer, updateStreamer,
        resetStorage, exportConfig, importConfig,
        sendDiscordNotification, testWebhook,
        initiateKickOAuth, disconnectKickOAuth,
      };

      return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
    }

    /* ═══════════════════════════════════════════════════════
       LATENCY MODULE
    ═══════════════════════════════════════════════════════ */
    const LATENCY_THRESHOLDS = { excellent: 80, good: 200 };
    function pingColor(ms) {
      if (ms === null) return 'var(--muted)';
      if (ms < LATENCY_THRESHOLDS.excellent) return 'var(--live)';
      if (ms < LATENCY_THRESHOLDS.good)      return 'var(--yellow)';
      return 'var(--red)';
    }

    async function measurePing(url) {
      const t = performance.now();
      try {
        await fetch(url, { method:'HEAD', mode:'no-cors', cache:'no-store' });
        return Math.round(performance.now() - t);
      } catch { return null; }
    }

    function LatencyPill() {
      const [ping, setPing] = useState(null);
      const [color, setColor] = useState('var(--muted)');
      const [running, setRunning] = useState(false);

      async function run() {
        setRunning(true);
        const ms = await measurePing('https://images.kick.com/favicon.ico');
        setPing(ms === null ? 'N/A' : `${ms}ms`);
        setColor(pingColor(ms));
        setRunning(false);
      }

      useEffect(() => { run(); const t = setInterval(run, 30000); return () => clearInterval(t); }, []);

      return (
        <button onClick={run} style={{
          display:'flex', alignItems:'center', gap:5,
          padding:'4px 10px', borderRadius:20, fontSize:11, fontWeight:600,
          border:'1px solid var(--border)', background:'none', cursor:'pointer',
          color:'var(--muted2)',
        }} title="Latencia a Kick">
          <span style={{ width:7, height:7, borderRadius:'50%', background:color, display:'inline-block', flexShrink:0 }}/>
          <Icon.Wifi />
          <span style={{ fontFamily:'monospace', color }}>{running ? '…' : (ping||'—')}</span>
        </button>
      );
    }

    /* ═══════════════════════════════════════════════════════
       STREAM CELL
    ═══════════════════════════════════════════════════════ */
    function StreamCell({ channelId }) {
      const { state, removeStream, cinemaIds, statusMap, showToast, muteAll } = useApp();
      const [hovered, setHovered] = useState(false);
      const iframeRef = useRef(null);
      const prevOnlineRef = useRef(null);
      const s = state.streamers.find(x => x.id === channelId);

      const cinemaIndex = cinemaIds.indexOf(channelId);
      const isCinema    = cinemaIndex >= 0;
      const totalCinema = cinemaIds.length;

      // Auto-reload iframe when stream goes from offline → online
      useEffect(() => {
        const st = statusMap[channelId];
        const isOnline = st && st.online;
        if (prevOnlineRef.current === false && isOnline === true) {
          if (iframeRef.current) {
            iframeRef.current.src = iframeRef.current.src;
          }
          showToast(`🔄 ${s?.name || channelId} volvió a conectarse – recargando stream...`, '#53fc18');
        }
        if (isOnline !== undefined) prevOnlineRef.current = isOnline;
      }, [statusMap, channelId, s, showToast]);

      // The inner div moves to position:fixed in cinema mode.
      // The OUTER div stays in the CSS grid as a placeholder.
      // The iframe is always in the same React tree position → NEVER recreated → no audio duplication.
      const innerStyle = isCinema ? {
        position: 'fixed',
        zIndex: 9994,
        background: 'var(--black)',
        overflow: 'hidden',
        ...getCinemaRect(cinemaIndex, totalCinema),
      } : {
        position: 'absolute',
        inset: 0,
      };

      const iframeSrc = muteAll
        ? `${KICK_PLAYER(channelId)}?muted=1`
        : KICK_PLAYER(channelId);

      return (
        // Outer: stays in the CSS grid (visible as placeholder when in cinema mode)
        <div style={{
          position: 'relative', background: isCinema ? 'var(--darker)' : 'var(--black)',
          overflow: 'hidden',
          border: isCinema ? '1px dashed rgba(83,252,24,.18)' : 'none',
        }}>
          {/* Placeholder indicator while stream is in cinema mode */}
          {isCinema && (
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              gap: 5, pointerEvents: 'none',
            }}>
              <span style={{ fontSize: 24 }}>🎬</span>
              <span style={{ fontSize: 10, color: 'rgba(83,252,24,.45)', fontWeight: 700 }}>EN MODO CINE</span>
            </div>
          )}
          {/* Inner: position:fixed in cinema mode (iframe reused, not recreated) */}
          <div
            style={innerStyle}
            onMouseEnter={() => setHovered(true)}
            onMouseLeave={() => setHovered(false)}
          >
            <iframe
              ref={iframeRef}
              src={iframeSrc}
              allowFullScreen
              scrolling="no"
              style={{ width:'100%', height:'100%', display:'block', border:'none' }}
              title={`Stream de ${s?.name || channelId}`}
            />
            {/* Mute indicator */}
            {muteAll && (
              <div style={{
                position:'absolute', top:6, left:6, zIndex:2,
                background:'rgba(0,0,0,.75)', borderRadius:4, padding:'2px 6px',
                fontSize:11, color:'var(--muted)',
              }}>🔇</div>
            )}
            {/* Overlay controls */}
            <div style={{
              position:'absolute', top:8, right:8,
              display:'flex', gap:4, padding:'4px 6px',
              background:'rgba(0,0,0,.75)', borderRadius:7,
              opacity: hovered ? 1 : 0, transition:'opacity .15s', zIndex:2,
            }}>
              <button
                onClick={() => removeStream(channelId)}
                style={{
                  fontSize:11, padding:'3px 7px', borderRadius:5, color:'var(--white)',
                  background:'none', border:'1px solid rgba(255,255,255,.2)', cursor:'pointer',
                }}
                title="Cerrar stream"
              >✕</button>
            </div>
            {/* Channel label */}
            <div style={{
              position:'absolute', bottom:8, left:8,
              background:'rgba(0,0,0,.7)', borderRadius:5, padding:'2px 7px',
              fontSize:11, fontWeight:700, color: s?.color || 'var(--neon)',
              opacity: hovered ? 1 : 0, transition:'opacity .15s', zIndex:2,
            }}>
              {s?.avatar} {s?.name || channelId}
              {GANG_TAGS[channelId] && (
                <span style={{ marginLeft:5, opacity:.65, fontSize:10 }}>[{GANG_TAGS[channelId]}]</span>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       CINEMA BAR (Multi-Cinema Mode)
       Renders only the top bar + optional chat panel.
       The actual stream iframes stay in StreamCell (position:fixed),
       so audio/video sessions are never interrupted.
    ═══════════════════════════════════════════════════════ */
    function CinemaBar() {
      const { state, cinemaIds, exitCinema } = useApp();
      const [showChat, setShowChat] = useState(false);
      const [chatCh, setChatCh] = useState('');
      const prevLenRef = useRef(0);

      // Fullscreen + keyboard shortcut
      useEffect(() => {
        function onKey(e) { if (e.key === 'Escape') exitCinema(); }
        if (cinemaIds.length > 0) {
          document.addEventListener('keydown', onKey);
          if (prevLenRef.current === 0) {
            document.documentElement.requestFullscreen?.().catch(() => {});
          }
        } else {
          document.exitFullscreen?.().catch(() => {});
        }
        prevLenRef.current = cinemaIds.length;
        return () => document.removeEventListener('keydown', onKey);
      }, [cinemaIds]);

      // Default chat channel when first stream enters cinema
      useEffect(() => {
        if (cinemaIds.length > 0 && !chatCh) setChatCh(cinemaIds[0]);
        if (cinemaIds.length === 0) { setShowChat(false); setChatCh(''); }
      }, [cinemaIds]);

      if (cinemaIds.length === 0) return null;

      const CHAT_W = 290;

      return (
        <>
          {/* Dark backdrop covering the normal grid below the cinema streams */}
          <div style={{
            position:'fixed', top:44, left:0, right: showChat ? CHAT_W : 0, bottom:0,
            zIndex:9990, background:'var(--black)', pointerEvents:'none',
          }} />

          {/* Top bar */}
          <div style={{
            position:'fixed', top:0, left:0, right:0, height:44,
            zIndex:9999, background:'#000', borderBottom:'1px solid var(--border)',
            display:'flex', alignItems:'center', gap:8, padding:'0 14px', flexShrink:0,
          }}>
            <span style={{ fontSize:12, fontWeight:700, color:'var(--neon)', flexShrink:0 }} className="glow">
              🎬 MULTI-CINE
            </span>
            {/* Stream chips — click to remove from cinema */}
            <div style={{ display:'flex', gap:5, flex:1, overflow:'hidden', flexWrap:'nowrap' }}>
              {cinemaIds.map(id => {
                const s = state.streamers.find(x => x.id === id);
                return (
                  <button
                    key={id}
                    onClick={() => exitCinema(id)}
                    style={{
                      display:'flex', alignItems:'center', gap:5,
                      padding:'3px 9px', borderRadius:5, fontSize:11, fontWeight:600,
                      background:'rgba(83,252,24,.1)', border:'1px solid rgba(83,252,24,.3)',
                      color:'var(--neon)', cursor:'pointer', flexShrink:0,
                    }}
                    title="Quitar del modo cine"
                  >
                    {s?.avatar} {s?.name || id} ✕
                    {GANG_TAGS[id] && <span style={{ opacity:.65, fontSize:10 }}>[{GANG_TAGS[id]}]</span>}
                  </button>
                );
              })}
            </div>
            <div style={{ display:'flex', gap:6, marginLeft:'auto', flexShrink:0 }}>
              <button
                onClick={() => setShowChat(v => !v)}
                style={S.btnOutline(showChat ? 'var(--neon)' : undefined)}
              >
                {showChat ? 'Ocultar chat' : 'Chat'}
              </button>
              <button
                onClick={() => { exitCinema(); document.exitFullscreen?.().catch(() => {}); }}
                style={S.btnOutline('var(--neon)')}
              >
                Salir (Esc)
              </button>
            </div>
          </div>

          {/* Chat panel — fixed on the right */}
          {showChat && (
            <div style={{
              position:'fixed', top:44, right:0, width:CHAT_W, bottom:0,
              zIndex:9999, background:'var(--black)', borderLeft:'1px solid var(--border)',
              display:'flex', flexDirection:'column',
            }}>
              <div style={{
                padding:'6px 10px', borderBottom:'1px solid var(--border)', flexShrink:0,
                display:'flex', alignItems:'center', gap:6,
              }}>
                <span style={{ fontSize:10, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.1em' }}>Chat</span>
                <select
                  value={chatCh}
                  onChange={e => setChatCh(e.target.value)}
                  style={{
                    background:'var(--border)', border:'none', borderRadius:5,
                    color:'var(--white)', fontSize:11, padding:'2px 6px', cursor:'pointer',
                    outline:'none', flex:1,
                  }}
                >
                  {cinemaIds.map(id => {
                    const s = state.streamers.find(x => x.id === id);
                    return <option key={id} value={id}>{s ? s.name : id}</option>;
                  })}
                </select>
              </div>
              <iframe
                src={chatCh ? KICK_CHAT(chatCh) : ''}
                style={{ flex:1, width:'100%', border:'none' }}
                title="Chat modo cine"
              />
            </div>
          )}
        </>
      );
    }

    /* ═══════════════════════════════════════════════════════
       ADMIN PANEL
    ═══════════════════════════════════════════════════════ */
    function AdminPanel() {
      const { state, updateState, setShowAdmin, addStreamer, removeStreamer, updateStreamer,
              resetStorage, exportConfig, importConfig, testWebhook, showToast,
              initiateKickOAuth, disconnectKickOAuth } = useApp();
      const [newName, setNewName] = useState('');
      const [newId, setNewId]     = useState('');
      const [newColor, setNewColor] = useState('#53fc18');
      const [newAvatar, setNewAvatar] = useState('🎮');
      const [webhookInput, setWebhookInput] = useState(state.webhookUrl || '');
      const [activeTab, setActiveTab] = useState('streamers');
      const importRef = useRef(null);

      const sectionStyle = {
        background:'var(--card2)', border:'1px solid var(--border)',
        borderRadius:12, padding:22, display:'flex', flexDirection:'column', gap:16,
      };
      const h2Style = { fontSize:16, fontWeight:800, color:'var(--neon)' };
      const pStyle  = { fontSize:13, color:'var(--muted2)', lineHeight:1.7 };

      function handleAddStreamer(e) {
        e.preventDefault();
        if (!newName.trim() || !newId.trim()) { showToast('Nombre e ID son obligatorios', '#ef4444'); return; }
        const id = newId.toLowerCase().trim();
        if (state.streamers.find(s => s.id === id)) { showToast('Ese ID ya existe', '#facc15'); return; }
        addStreamer({ id, name: newName.trim(), color: newColor, avatar: newAvatar.trim() || '🎮' });
        setNewName(''); setNewId(''); setNewAvatar('🎮');
        showToast(`${newName} añadido ✓`);
      }

      function handleImport(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => importConfig(ev.target.result);
        reader.readAsText(file);
      }

      const isKickConnected = !!(state.kickAccessToken && (!state.kickTokenExpiry || Date.now() < state.kickTokenExpiry));

      const tabs = [
        { id:'streamers',  label:'🎮 Streamers' },
        { id:'appearance', label:'🎨 Apariencia' },
        { id:'advanced',   label:'⚙️ Avanzado' },
      ];
      const tabBtn = (t) => ({
        padding:'8px 18px', borderRadius:8, fontSize:13, fontWeight:600,
        cursor:'pointer', border:'none',
        background: activeTab===t ? 'rgba(83,252,24,.12)' : 'none',
        color: activeTab===t ? 'var(--neon)' : 'var(--muted2)',
        transition:'all .15s',
      });

      return (
        <div style={{
          position:'fixed', inset:0, zIndex:9997,
          background:'var(--darker)', display:'flex', flexDirection:'column',
        }}>
          {/* Header */}
          <div style={{
            display:'flex', alignItems:'center', justifyContent:'space-between',
            padding:'14px 28px', background:'var(--black)', borderBottom:'1px solid var(--border)',
            flexShrink:0,
          }}>
            <span className="glow" style={{ fontSize:20, fontWeight:900, color:'var(--neon)' }}>
              ⚙️ Configuración
            </span>
            <button onClick={() => setShowAdmin(false)} style={S.btnOutline('var(--neon)')}>Cerrar</button>
          </div>

          {/* Tabs */}
          <div style={{
            display:'flex', gap:4, padding:'12px 28px',
            borderBottom:'1px solid var(--border)', background:'var(--black)', flexShrink:0,
          }}>
            {tabs.map(t => <button key={t.id} style={tabBtn(t.id)} onClick={() => setActiveTab(t.id)}>{t.label}</button>)}
          </div>

          {/* Body */}
          <div style={{ flex:1, overflowY:'auto', padding:'24px 28px', maxWidth:800, margin:'0 auto', width:'100%', display:'flex', flexDirection:'column', gap:24 }}>

            {/* STREAMERS */}
            {activeTab==='streamers' && (
              <section style={sectionStyle}>
                <h2 style={h2Style}>Streamers de La Ganga</h2>
                <p style={pStyle}>
                  El canal de <strong style={{color:'var(--white)'}}>Leandro</strong> (La Sapa) tiene el slug
                  <code style={{color:'var(--neon)', fontFamily:'monospace', marginLeft:5}}>lasapaaaaa</code>.
                </p>
                <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                  {state.streamers.map(s => (
                    <div key={s.id} style={{
                      display:'flex', alignItems:'center', gap:8,
                      background:'rgba(255,255,255,.04)', borderRadius:9, padding:'9px 12px', border:'1px solid var(--border)',
                    }}>
                      <span style={{ fontSize:18, flexShrink:0 }}>{s.avatar}</span>
                      <input value={s.name} onChange={e => updateStreamer(s.id, { name: e.target.value })}
                        style={{ ...S.input, flex:1, padding:'5px 9px', fontSize:13 }} placeholder="Nombre" />
                      <input value={s.id} readOnly
                        style={{ ...S.input, width:130, padding:'5px 9px', fontSize:12, fontFamily:'monospace', opacity:.6 }}
                        title="Slug de Kick (no editable)" />
                      <input type="color" value={s.color} onChange={e => updateStreamer(s.id, { color: e.target.value })}
                        style={{ width:32, height:32, borderRadius:6, border:'none', cursor:'pointer', flexShrink:0 }} />
                      <button
                        onClick={() => { if (confirm(`¿Eliminar a ${s.name}?`)) removeStreamer(s.id); }}
                        style={{ color:'#ef4444', fontSize:12, padding:'5px 9px', borderRadius:6,
                          background:'rgba(239,68,68,.1)', border:'1px solid rgba(239,68,68,.2)', cursor:'pointer' }}
                      >✕</button>
                    </div>
                  ))}
                </div>
                <div style={{ borderTop:'1px solid var(--border)', paddingTop:16 }}>
                  <label style={S.label}>Añadir nuevo streamer</label>
                  <form onSubmit={handleAddStreamer} style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                    <input value={newAvatar} onChange={e => setNewAvatar(e.target.value)}
                      placeholder="😀" style={{ ...S.input, width:60, textAlign:'center', fontSize:18 }} maxLength="4" />
                    <input value={newName} onChange={e => setNewName(e.target.value)}
                      placeholder="Nombre a mostrar" style={{ ...S.input, flex:1, minWidth:120 }} />
                    <input value={newId} onChange={e => setNewId(e.target.value)}
                      placeholder="slug en Kick" style={{ ...S.input, flex:1, minWidth:120, fontFamily:'monospace' }} />
                    <input type="color" value={newColor} onChange={e => setNewColor(e.target.value)}
                      style={{ width:36, height:36, borderRadius:6, border:'none', cursor:'pointer' }} />
                    <button type="submit" style={S.btnNeon}>Añadir</button>
                  </form>
                </div>
              </section>
            )}

            {/* APPEARANCE */}
            {activeTab==='appearance' && (
              <section style={sectionStyle}>
                <h2 style={h2Style}>Apariencia</h2>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
                  <div>
                    <label style={S.label}>Color de acento</label>
                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                      <input type="color" value={state.accent||'#53fc18'}
                        onChange={e => updateState({ accent: e.target.value })}
                        style={{ width:38, height:38, borderRadius:7, border:'none', cursor:'pointer' }} />
                      <span style={{ fontFamily:'monospace', fontSize:13, color:'var(--muted2)' }}>{state.accent||'#53fc18'}</span>
                    </div>
                  </div>
                  <div>
                    <label style={S.label}>Título de página</label>
                    <input value={state.pageTitle||''} onChange={e => updateState({ pageTitle: e.target.value })}
                      style={S.input} placeholder="La Ganga – Dashboard" />
                  </div>
                  <div>
                    <label style={S.label}>Logo / nombre</label>
                    <input value={state.logoText||''} onChange={e => updateState({ logoText: e.target.value })}
                      style={S.input} placeholder="LA GANGA" />
                  </div>
                  <div>
                    <label style={S.label}>Subtítulo</label>
                    <input value={state.subtitle||''} onChange={e => updateState({ subtitle: e.target.value })}
                      style={S.input} placeholder="Multi-Stream Dashboard" />
                  </div>
                  <div>
                    <label style={S.label}>🎯 Meta de hito (followers)</label>
                    <input
                      type="number" min="1"
                      value={state.milestoneGoal || 10000}
                      onChange={e => updateState({ milestoneGoal: Math.max(1, parseInt(e.target.value, 10) || 1) })}
                      style={S.input}
                      placeholder="10000"
                    />
                    <div style={{ fontSize:11, color:'var(--muted)', marginTop:5 }}>
                      Requiere token OAuth de Kick para obtener datos de seguidores.
                    </div>
                  </div>
                </div>
              </section>
            )}

            {/* ADVANCED */}
            {activeTab==='advanced' && (
              <>
                {/* OAuth2 section */}
                <section style={sectionStyle}>
                  <h2 style={h2Style}>🔑 Kick OAuth2</h2>
                  <p style={pStyle}>
                    Conecta con la API oficial de Kick v2 para obtener datos adicionales como el conteo de seguidores.
                    El token se guarda en localStorage y persiste entre sesiones.
                  </p>
                  <div style={{
                    display:'flex', alignItems:'center', gap:10, padding:'10px 14px',
                    borderRadius:9, border:`1px solid ${isKickConnected ? 'rgba(34,197,94,.3)' : 'rgba(239,68,68,.3)'}`,
                    background: isKickConnected ? 'rgba(34,197,94,.06)' : 'rgba(239,68,68,.06)',
                    fontSize:13, fontWeight:600,
                    color: isKickConnected ? 'var(--live)' : 'var(--red)',
                  }}>
                    <span style={{ fontSize:18 }}>{isKickConnected ? '✅' : '❌'}</span>
                    <span>{isKickConnected ? `App Conectada: ${KICK_APP_NAME}` : 'Sin token OAuth'}</span>
                  </div>
                  <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                    <button
                      onClick={initiateKickOAuth}
                      style={{ ...S.btnNeon, display:'flex', alignItems:'center', gap:7 }}
                    >
                      🔑 Conectar con Kick
                    </button>
                    {isKickConnected && (
                      <button
                        onClick={disconnectKickOAuth}
                        style={{ ...S.btnOutline('#ef4444'), color:'#ef4444' }}
                      >
                        Desconectar
                      </button>
                    )}
                  </div>
                  <div style={{ fontSize:11, color:'var(--muted)', lineHeight:1.7 }}>
                    <strong style={{ color:'var(--white)' }}>¿Cómo funciona?</strong><br/>
                    Al hacer clic en "Conectar con Kick" serás redirigido al portal de autorización de Kick
                    (OAuth 2.0 Authorization Code + PKCE). Tras autorizar, volverás aquí automáticamente
                    y el token se guardará en localStorage. No se necesita backend.
                    <br/>
                    <strong style={{ color:'var(--yellow)' }}>✅ Client ID:</strong>{' '}
                    <code style={{ fontFamily:'monospace', color:'var(--neon)' }}>{KICK_CLIENT_ID}</code>
                    <br/>
                    <strong style={{ color:'var(--yellow)' }}>Redirect URI (registrar en Kick):</strong>{' '}
                    <code style={{ fontFamily:'monospace', color:'var(--neon)', wordBreak:'break-all' }}>
                      {getOAuthRedirectUri()}
                    </code>
                    <br/>
                    <strong style={{ color:'var(--yellow)' }}>Scopes:</strong>{' '}
                    <code style={{ fontFamily:'monospace', color:'var(--muted2)' }}>user:read chat:write</code>
                  </div>
                </section>

                <section style={sectionStyle}>
                  <h2 style={h2Style}>🔔 Webhook de Discord</h2>
                  <p style={pStyle}>
                    Discord → Servidor → Canal → ⚙ Configuración → Integraciones → Webhooks.
                    Las notificaciones se envían directamente desde el navegador (client-side fetch).
                  </p>
                  <div>
                    <label style={S.label}>URL del webhook</label>
                    <input type="url" value={webhookInput} onChange={e => setWebhookInput(e.target.value)}
                      placeholder="https://discord.com/api/webhooks/ID/TOKEN" style={S.input} />
                  </div>
                  <div style={{ display:'flex', gap:8 }}>
                    <button onClick={() => { updateState({ webhookUrl: webhookInput }); showToast('Webhook guardado ✓'); }}
                      style={S.btnNeon}>Guardar</button>
                    <button onClick={() => testWebhook(webhookInput)} style={S.btnOutline('var(--neon)')}>Probar</button>
                  </div>
                </section>

                <section style={sectionStyle}>
                  <h2 style={h2Style}>🔗 Estado en tiempo real</h2>
                  <p style={pStyle}>
                    El estado en vivo se obtiene preferentemente de la API oficial de Kick v2.
                    Si no hay token OAuth2, se usa la API pública v1 como fallback.
                    Se actualiza cada 45 segundos.
                  </p>
                  <div style={{ background:'rgba(83,252,24,.06)', border:'1px solid rgba(83,252,24,.15)',
                    borderRadius:8, padding:'12px 16px', fontSize:12, fontFamily:'monospace', lineHeight:1.9, color:'var(--muted2)' }}>
                    <div><span style={{color:'var(--muted)'}}>GET (v2 oficial)</span> <span style={{color:'var(--neon)'}}>https://api.kick.com/public/v1/channels?broadcaster_user_login=<span style={{color:'var(--yellow)'}}>slug</span></span></div>
                    <div style={{marginTop:4}}><span style={{color:'var(--muted)'}}>GET (v1 fallback)</span> <span style={{color:'var(--muted2)'}}>https://kick.com/api/v1/channels/<span style={{color:'var(--yellow)'}}>slug</span></span></div>
                    <div style={{marginTop:4}}><span style={{color:'var(--muted)'}}>→</span> livestream.viewer_count, followers_count, .categories, .created_at</div>
                  </div>
                </section>

                <section style={sectionStyle}>
                  <h2 style={h2Style}>💾 Datos locales</h2>
                  <p style={pStyle}>
                    La configuración se guarda en localStorage y persiste entre recargas.
                  </p>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                    <button onClick={exportConfig} style={S.btnOutline()}>📤 Exportar JSON</button>
                    <button onClick={() => importRef.current?.click()} style={S.btnOutline()}>📥 Importar JSON</button>
                    <button
                      onClick={() => { if (confirm('¿Borrar todos los datos?')) resetStorage(); }}
                      style={{ ...S.btnOutline('#ef4444'), color:'#ef4444', borderColor:'rgba(239,68,68,.4)' }}
                    >🗑 Limpiar todo</button>
                  </div>
                  <input type="file" ref={importRef} accept=".json" onChange={handleImport} style={{ display:'none' }} />
                </section>
              </>
            )}

          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       MAIN APP
    ═══════════════════════════════════════════════════════ */
    function App() {
      const { state, showAdmin, showDiscord } = useApp();
      const isMobile = useIsMobile();

      return (
        <div style={{ height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden', background:'var(--darker)' }}>
          <Header />
          <div style={{ display:'flex', flex:1, overflow:'hidden', position:'relative' }}>
            <Sidebar />
            <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden', minWidth:0 }}>
              <StreamGrid />
              {/* Desktop dashboard bar */}
              {!isMobile && <Dashboard />}
            </div>
            <ChatPanel />
          </div>
          {/* Mobile: stats bar shown only when grid is empty */}
          {isMobile && state.active.length === 0 && (
            <div style={{ flexShrink:0, overflowX:'auto', background:'var(--darker)', borderTop:'1px solid var(--border)' }}>
              <div style={{ display:'flex', gap:8, padding:10, minWidth:'max-content' }}>
                {state.streamers.map(s => <StatsCard key={s.id} streamer={s} />)}
              </div>
            </div>
          )}

          <CinemaBar />
          {showDiscord && <DiscordModal />}
          {showAdmin   && <AdminPanel />}
          <Toast />
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       RENDER
    ═══════════════════════════════════════════════════════ */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppProvider><App /></AppProvider>);
  </script>
</body>
</html>
