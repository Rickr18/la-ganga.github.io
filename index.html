<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Ganga – Multi-Stream Dashboard</title>
  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --neon:   #53fc18;
      --black:  #000000;
      --darker: #050505;
      --dark:   #0a0a0a;
      --card:   #111111;
      --border: #1e1e1e;
      --muted:  #6b7280;
      --white:  #f3f4f6;
      --red:    #ef4444;
      --yellow: #facc15;
      --blue:   #3b82f6;
    }
    html, body { height: 100%; overflow: hidden; background: var(--darker); }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: var(--white); }
    #root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
    input, select, textarea { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--darker); }
    ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 4px; }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(83,252,24,.7); }
      50%       { box-shadow: 0 0 0 6px rgba(83,252,24,0); }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes glow-pulse {
      0%, 100% { text-shadow: 0 0 6px var(--neon), 0 0 18px rgba(83,252,24,.4); }
      50%       { text-shadow: 0 0 14px var(--neon), 0 0 40px rgba(83,252,24,.7); }
    }

    .dot-online { animation: pulse-dot 1.6s infinite; }
    .glow       { animation: glow-pulse 3s ease-in-out infinite; }
    .fade-in    { animation: fadeIn .25s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef, createContext, useContext, useMemo, useReducer } = React;

    /* ═══════════════════════════════════════════════════════
       CONSTANTS & DEFAULTS
    ═══════════════════════════════════════════════════════ */
    const LS_KEY = 'laganga_v4';
    const KICK_PLAYER = id => `https://player.kick.com/${id}`;
    const KICK_CHAT   = id => `https://kick.com/${id}/chatroom`;
    const KICK_LINK   = id => `https://kick.com/${id}`;

    const DEFAULT_STREAMERS = [
      { id:'westcol',    name:'Westcol',     color:'#53fc18', avatar:'🟢' },
      { id:'willito',    name:'Willito',     color:'#facc15', avatar:'🟡' },
      { id:'leandro',    name:'Leandro',     color:'#3b82f6', avatar:'🔵' },
      { id:'chanty',     name:'Chanty',      color:'#ec4899', avatar:'🩷' },
      { id:'samulx',     name:'Samulx',      color:'#a855f7', avatar:'🟣' },
      { id:'lonche',     name:'Lonche',      color:'#f97316', avatar:'🟠' },
      { id:'lasapaaaaa', name:'Lasapaaaaa',  color:'#ef4444', avatar:'🔴' },
    ];

    const GRID_CLASSES = {
      1: { cols:'1fr',           rows:'1fr'      },
      2: { cols:'1fr 1fr',       rows:'1fr'      },
      3: { cols:'1fr 1fr',       rows:'1fr 1fr'  },
      4: { cols:'1fr 1fr',       rows:'1fr 1fr'  },
      5: { cols:'1fr 1fr 1fr',   rows:'1fr 1fr'  },
      6: { cols:'1fr 1fr 1fr',   rows:'1fr 1fr'  },
    };

    function getGridStyle(n, isMobile) {
      if (isMobile) {
        // On mobile, stack all streams vertically
        return { display:'grid', gridTemplateColumns:'1fr', gridTemplateRows:`repeat(${n}, minmax(180px, 1fr))`, width:'100%', height:'100%', gap:'3px', overflowY:'auto' };
      }
      const g = GRID_CLASSES[Math.min(Math.max(n,1),6)];
      return { display:'grid', gridTemplateColumns:g.cols, gridTemplateRows:g.rows, width:'100%', height:'100%', gap:'3px' };
    }

    /* ═══════════════════════════════════════════════════════
       MOBILE HOOK
    ═══════════════════════════════════════════════════════ */
    function useIsMobile(breakpoint) {
      const bp = breakpoint || 768;
      const [isMobile, setIsMobile] = useState(() => window.innerWidth <= bp);
      useEffect(() => {
        function onResize() { setIsMobile(window.innerWidth <= bp); }
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, [bp]);
      return isMobile;
    }

    /* ═══════════════════════════════════════════════════════
       STATE MANAGEMENT
    ═══════════════════════════════════════════════════════ */
    const defaultState = {
      streamers:   DEFAULT_STREAMERS,
      active:      [],
      chatOpen:    false,
      chatChannel: '',
      webhookUrl:  '',
      webhookMode: 'all',
      accent:      '#53fc18',
      logoText:    'LA GANGA',
      subtitle:    'Multi-Stream Dashboard',
      pageTitle:   'La Ganga – Multi-Stream Dashboard',
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return defaultState;
        const saved = JSON.parse(raw);
        const merged = { ...defaultState, ...saved };
        if (!Array.isArray(merged.streamers) || merged.streamers.length === 0)
          merged.streamers = DEFAULT_STREAMERS;
        return merged;
      } catch { return defaultState; }
    }

    function saveState(s) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {}
    }

    /* ═══════════════════════════════════════════════════════
       SIMULATED STATUS (fallback when API unavailable)
    ═══════════════════════════════════════════════════════ */
    function getSimStatus(id) {
      const n = id.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
      return {
        online:   n % 3 !== 0,
        viewers:  (n * 137) % 14500 + 300,
        peak:     (n * 251) % 24000 + 1500,
        category: ['Just Chatting','IRL','Videojuegos','Música','Arte'][n % 5],
        uptime:   `${(n % 5)+1}h ${n % 59}m`,
      };
    }

    function fmtNum(n) { return n >= 1000 ? (n/1000).toFixed(1)+'K' : String(n); }

    /* ═══════════════════════════════════════════════════════
       CONTEXT
    ═══════════════════════════════════════════════════════ */
    const AppCtx = createContext(null);
    function useApp() { return useContext(AppCtx); }

    function AppProvider({ children }) {
      const [state, setState] = useState(() => loadState());
      const [toast, setToast] = useState({ msg:'', color:'', show:false });
      const [cinemaId, setCinemaId] = useState(null);
      const [showAdmin, setShowAdmin] = useState(false);
      const [showDiscord, setShowDiscord] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [statusMap, setStatusMap] = useState({});
      const toastRef = useRef(null);

      // persist whenever state changes
      useEffect(() => { saveState(state); }, [state]);

      // update page title
      useEffect(() => {
        document.title = state.pageTitle || 'La Ganga – Dashboard';
      }, [state.pageTitle]);

      // init status map from sim data
      useEffect(() => {
        const map = {};
        state.streamers.forEach(s => { map[s.id] = getSimStatus(s.id); });
        setStatusMap(map);
      }, [state.streamers]);

      // apply accent color CSS variable
      useEffect(() => {
        document.documentElement.style.setProperty('--neon', state.accent || '#53fc18');
      }, [state.accent]);

      function showToast(msg, color) {
        setToast({ msg, color: color || state.accent, show: true });
        clearTimeout(toastRef.current);
        toastRef.current = setTimeout(() => setToast(t => ({ ...t, show:false })), 3000);
      }

      function addStream(id) {
        id = id.toLowerCase().trim();
        if (!id) return;
        if (state.active.includes(id)) { showToast(`${id} ya está en el grid`, '#facc15'); return; }
        if (state.active.length >= 6)  { showToast('Máximo 6 streams simultáneos', '#ef4444'); return; }
        setState(s => ({ ...s, active: [...s.active, id] }));
        showToast(`▶ ${id} añadido al grid`);
      }

      function removeStream(id) {
        setState(s => ({ ...s, active: s.active.filter(x => x !== id) }));
      }

      function toggleStream(id) {
        if (state.active.includes(id)) removeStream(id);
        else addStream(id);
      }

      function clearStreams() {
        setState(s => ({ ...s, active: [] }));
        showToast('Grid limpiado', '#ef4444');
      }

      function openChat(channelId) {
        const ch = channelId || state.streamers[0]?.id || '';
        setState(s => ({ ...s, chatOpen: true, chatChannel: ch }));
      }
      function closeChat() { setState(s => ({ ...s, chatOpen: false })); }
      function setChatChannel(ch) { setState(s => ({ ...s, chatChannel: ch })); }

      function enterCinema(id) { setCinemaId(id); }
      function exitCinema()    { setCinemaId(null); }

      function updateState(partial) { setState(s => ({ ...s, ...partial })); }
      function addStreamer(streamer) {
        setState(s => ({ ...s, streamers: [...s.streamers, streamer] }));
      }
      function removeStreamer(id) {
        setState(s => ({ ...s, streamers: s.streamers.filter(x => x.id !== id), active: s.active.filter(x => x !== id) }));
      }
      function updateStreamer(id, partial) {
        setState(s => ({ ...s, streamers: s.streamers.map(x => x.id === id ? { ...x, ...partial } : x) }));
      }
      function resetStorage() {
        localStorage.removeItem(LS_KEY);
        setState({ ...defaultState, streamers: DEFAULT_STREAMERS });
        showToast('Datos borrados. Recargando…', '#ef4444');
        setTimeout(() => window.location.reload(), 1500);
      }
      function exportConfig() {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'laganga-config.json';
        a.click();
      }
      function importConfig(json) {
        try {
          const data = JSON.parse(json);
          setState(s => ({ ...s, ...data }));
          showToast('Configuración importada ✓');
        } catch { showToast('JSON inválido', '#ef4444'); }
      }

      async function sendDiscordNotification(streamerId, online) {
        const url = state.webhookUrl;
        if (!url || !url.startsWith('https://discord.com/api/webhooks/')) return;
        const s = state.streamers.find(x => x.id === streamerId) || { name: streamerId };
        const accentColor = parseInt((state.accent || '#53fc18').slice(1), 16);
        const body = {
          embeds: [{
            title: online ? `🟢 ${s.name} está EN VIVO` : `⚫ ${s.name} se fue Offline`,
            description: online
              ? `**${s.name}** acaba de conectarse en Kick!\n${KICK_LINK(streamerId)}`
              : `**${s.name}** terminó su stream.`,
            color: online ? accentColor : 0x6b7280,
            timestamp: new Date().toISOString(),
            footer: { text: 'La Ganga Dashboard' },
          }],
        };
        try {
          await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
          showToast(`Notificación enviada: ${s.name}`);
        } catch { showToast('Error al enviar notificación', '#ef4444'); }
      }

      async function testWebhook(url) {
        if (!url || !url.startsWith('https://discord.com/api/webhooks/')) {
          showToast('URL de webhook inválida', '#ef4444'); return;
        }
        const accentColor = parseInt((state.accent || '#53fc18').slice(1), 16);
        const body = {
          embeds:[{
            title:'✅ Test – La Ganga Dashboard',
            description:'El webhook funciona correctamente. ¡Las alertas llegarán a Discord!',
            color: accentColor,
            timestamp: new Date().toISOString(),
            footer: { text: 'La Ganga Dashboard' },
          }],
        };
        try {
          const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
          if (r.ok || r.status === 204) showToast('✅ Webhook OK – revisa Discord');
          else showToast(`Error ${r.status}`, '#ef4444');
        } catch { showToast('Error de red al probar webhook', '#ef4444'); }
      }

      const value = {
        state, updateState,
        addStream, removeStream, toggleStream, clearStreams,
        openChat, closeChat, setChatChannel,
        cinemaId, enterCinema, exitCinema,
        showAdmin, setShowAdmin,
        showDiscord, setShowDiscord,
        sidebarOpen, setSidebarOpen,
        statusMap,
        toast,
        showToast,
        addStreamer, removeStreamer, updateStreamer,
        resetStorage, exportConfig, importConfig,
        sendDiscordNotification, testWebhook,
      };

      return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
    }

    /* ═══════════════════════════════════════════════════════
       ICON COMPONENTS
    ═══════════════════════════════════════════════════════ */
    const Icon = {
      Menu: () => <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="18" height="18"><path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>,
      Chat: () => <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="18" height="18"><path strokeLinecap="round" strokeLinejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>,
      Discord: () => <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.082.114 18.104.132 18.12a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>,
      Settings: () => <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="18" height="18"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>,
      Close: () => <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="18" height="18"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>,
      Wifi:  () => <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="14" height="14"><path strokeLinecap="round" strokeLinejoin="round" d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>,
      Eye:   () => <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="12" height="12"><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>,
      Film:  () => <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="14" height="14"><path strokeLinecap="round" strokeLinejoin="round" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/></svg>,
      Plus:  () => <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="14" height="14"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>,
      Star:  () => <svg fill="currentColor" viewBox="0 0 24 24" width="12" height="12"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
      Trash: () => <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="14" height="14"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
    };

    /* ═══════════════════════════════════════════════════════
       SHARED STYLES
    ═══════════════════════════════════════════════════════ */
    const S = {
      iconBtn: {
        width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center',
        borderRadius:7, color:'var(--white)', transition:'background .15s, color .15s',
        border:'none', background:'none', cursor:'pointer', flexShrink:0,
      },
      pill: (active, color) => ({
        display:'flex', alignItems:'center', gap:5,
        padding:'3px 10px', borderRadius:20, fontSize:11, fontWeight:600,
        border:`1px solid ${active ? (color||'var(--neon)') : 'var(--border)'}`,
        color: active ? (color||'var(--neon)') : 'var(--muted)',
        cursor:'pointer', background:'none',
        transition:'border-color .15s, color .15s',
      }),
      card: {
        background:'var(--card)', border:'1px solid var(--border)',
        borderRadius:10, padding:'10px 12px',
        display:'flex', flexDirection:'column', gap:5,
        animation:'fadeIn .25s ease',
      },
      input: {
        background:'var(--border)', border:'1px solid var(--border)',
        borderRadius:7, padding:'7px 12px', fontSize:13,
        color:'var(--white)', outline:'none', width:'100%',
        transition:'border-color .15s',
      },
      btnNeon: {
        background:'var(--neon)', color:'var(--black)', fontWeight:700,
        borderRadius:7, padding:'7px 14px', fontSize:13,
        border:'none', cursor:'pointer',
      },
      btnOutline: (color) => ({
        border:`1px solid ${color||'var(--border)'}`,
        color: color||'var(--muted)',
        borderRadius:7, padding:'7px 14px', fontSize:12, fontWeight:600,
        background:'none', cursor:'pointer',
        transition:'background .12s, color .12s, border-color .12s',
      }),
      label: {
        fontSize:10, fontWeight:700, color:'var(--muted)',
        textTransform:'uppercase', letterSpacing:'.1em',
        display:'block', marginBottom:5,
      },
    };

    /* ═══════════════════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════════════════ */
    function Toast() {
      const { toast } = useApp();
      return (
        <div style={{
          position:'fixed', bottom:20, right:20, zIndex:99999,
          padding:'10px 16px', borderRadius:9, fontSize:13, fontWeight:600,
          background:'var(--card)', border:`1px solid ${toast.color||'var(--neon)'}`,
          color: toast.color||'var(--neon)', minWidth:180,
          boxShadow:'0 4px 24px rgba(0,0,0,.7)',
          transition:'opacity .3s, transform .3s',
          opacity: toast.show ? 1 : 0,
          transform: toast.show ? 'translateY(0)' : 'translateY(8px)',
          pointerEvents:'none',
        }}>
          {toast.msg}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       LATENCY MODULE
    ═══════════════════════════════════════════════════════ */
    const KICK_ENDPOINTS = [
      { label:'Kick CDN',  url:'https://images.kick.com/favicon.ico' },
      { label:'Kick Main', url:'https://kick.com/favicon.ico' },
      { label:'Kick API',  url:'https://api.kick.com/favicon.ico' },
    ];

    const LATENCY_THRESHOLDS = { excellent: 80, good: 200 };
    function pingColor(ms) {
      if (ms === null) return 'var(--muted)';
      if (ms < LATENCY_THRESHOLDS.excellent) return '#53fc18';
      if (ms < LATENCY_THRESHOLDS.good)      return '#facc15';
      return '#ef4444';
    }

    async function measurePing(url) {
      const t = performance.now();
      try {
        await fetch(url, { method:'HEAD', mode:'no-cors', cache:'no-store' });
        return Math.round(performance.now() - t);
      } catch { return null; }
    }

    function LatencyPill() {
      const [ping, setPing] = useState(null);
      const [color, setColor] = useState('var(--muted)');
      const [running, setRunning] = useState(false);

      async function run() {
        setRunning(true);
        const ms = await measurePing(KICK_ENDPOINTS[0].url);
        const c = pingColor(ms);
        setPing(ms === null ? 'N/A' : `${ms}ms`);
        setColor(c);
        setRunning(false);
      }

      useEffect(() => { run(); const t = setInterval(run, 30000); return () => clearInterval(t); }, []);

      return (
        <button onClick={run} style={{
          display:'flex', alignItems:'center', gap:5,
          padding:'3px 9px', borderRadius:20, fontSize:11, color:'var(--muted)',
          border:'1px solid var(--border)', background:'none', cursor:'pointer',

        }} title="Latencia a Kick">
          <span style={{ width:8, height:8, borderRadius:'50%', background:color, display:'inline-block', flexShrink:0 }}/>
          <Icon.Wifi />
          <span style={{ fontFamily:'monospace', color }}>{running ? '...' : (ping||'Ping')}</span>
        </button>
      );
    }

    /* ═══════════════════════════════════════════════════════
       ADMIN PANEL – LATENCY SECTION
    ═══════════════════════════════════════════════════════ */
    function LatencySection() {
      const [results, setResults] = useState([]);
      const [running, setRunning] = useState(false);

      async function run() {
        setRunning(true);
        setResults([]);
        const rows = [];
        for (const ep of KICK_ENDPOINTS) {
          const ms = await measurePing(ep.url);
          rows.push({ label: ep.label, ms });
          setResults([...rows]);
        }
        setRunning(false);
      }

      return (
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          <button onClick={run} disabled={running} style={{ ...S.btnNeon, alignSelf:'flex-start' }}>
            {running ? '⏳ Midiendo…' : '▶ Ejecutar test de latencia'}
          </button>
          {results.length > 0 && (
            <div style={{ fontFamily:'monospace', fontSize:12, display:'flex', flexDirection:'column', gap:6 }}>
              {results.map(r => (
                <div key={r.label} style={{ display:'flex', justifyContent:'space-between', gap:16, padding:'4px 8px', background:'var(--border)', borderRadius:5 }}>
                  <span style={{ color:'var(--muted)' }}>{r.label}</span>
                  <span style={{ color: pingColor(r.ms), fontWeight:700 }}>
                    {r.ms !== null ? `${r.ms}ms` : 'Sin respuesta'}
                  </span>
                </div>
              ))}
              <div style={{ borderTop:'1px solid var(--border)', paddingTop:6, fontSize:11, color:'var(--muted)' }}>
                Verde &lt; {LATENCY_THRESHOLDS.excellent}ms · Amarillo &lt; {LATENCY_THRESHOLDS.good}ms · Rojo ≥ {LATENCY_THRESHOLDS.good}ms
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       ADMIN PANEL
    ═══════════════════════════════════════════════════════ */
    function AdminPanel() {
      const { state, updateState, setShowAdmin, addStreamer, removeStreamer, updateStreamer,
              resetStorage, exportConfig, importConfig, testWebhook, showToast } = useApp();
      const [newName, setNewName] = useState('');
      const [newId, setNewId]     = useState('');
      const [newColor, setNewColor] = useState('#53fc18');
      const [newAvatar, setNewAvatar] = useState('🎮');
      const [webhookInput, setWebhookInput] = useState(state.webhookUrl || '');
      const importRef = useRef(null);

      const sectionStyle = {
        background:'var(--card)', border:'1px solid var(--border)',
        borderRadius:12, padding:20, display:'flex', flexDirection:'column', gap:14,
      };
      const h2Style = { fontSize:15, fontWeight:700, color:'var(--neon)' };
      const pStyle  = { fontSize:12, color:'var(--muted)', lineHeight:1.6 };

      function handleAddStreamer(e) {
        e.preventDefault();
        if (!newName.trim() || !newId.trim()) { showToast('Nombre e ID son obligatorios', '#ef4444'); return; }
        const id = newId.toLowerCase().trim();
        if (state.streamers.find(s => s.id === id)) { showToast('ID ya existe', '#facc15'); return; }
        addStreamer({ id, name: newName.trim(), color: newColor, avatar: newAvatar.trim() || '🎮' });
        setNewName(''); setNewId(''); setNewAvatar('🎮');
        showToast(`${newName} añadido ✓`);
      }

      function handleSaveWebhook() {
        updateState({ webhookUrl: webhookInput });
        showToast('Webhook guardado ✓');
      }

      function handleImport(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => importConfig(ev.target.result);
        reader.readAsText(file);
      }

      return (
        <div style={{
          position:'fixed', inset:0, zIndex:9997,
          background:'var(--darker)', display:'flex', flexDirection:'column',
        }}>
          {/* Header */}
          <div style={{
            display:'flex', alignItems:'center', justifyContent:'space-between',
            padding:'14px 24px', background:'var(--black)', borderBottom:'1px solid var(--border)',
            flexShrink:0,
          }}>
            <span style={{ fontSize:20, fontWeight:800, color:'var(--neon)' }} className="glow">
              ⚙️ Panel de Administración
            </span>
            <button onClick={() => setShowAdmin(false)} style={S.btnOutline()}>Cerrar</button>
          </div>

          {/* Body */}
          <div style={{ flex:1, overflowY:'auto', padding:24, maxWidth:760, margin:'0 auto', width:'100%', display:'flex', flexDirection:'column', gap:24 }}>

            {/* Streamers */}
            <section style={sectionStyle}>
              <h2 style={h2Style}>🎮 Streamers de La Ganga</h2>
              <p style={pStyle}>Añade, edita o elimina miembros. Los cambios se guardan en localStorage.</p>
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {state.streamers.map(s => (
                  <div key={s.id} style={{
                    display:'flex', alignItems:'center', gap:8,
                    background:'var(--border)', borderRadius:7, padding:'8px 12px',
                  }}>
                    <span style={{ fontSize:16, flexShrink:0 }}>{s.avatar}</span>
                    <input
                      value={s.name}
                      onChange={e => updateStreamer(s.id, { name: e.target.value })}
                      style={{ ...S.input, flex:1, padding:'4px 8px', fontSize:12 }}
                      placeholder="Nombre"
                    />
                    <input
                      value={s.id}
                      readOnly
                      style={{ ...S.input, width:110, padding:'4px 8px', fontSize:12, fontFamily:'monospace', opacity:.7 }}
                      title="ID (no editable)"
                    />
                    <input
                      type="color"
                      value={s.color}
                      onChange={e => updateStreamer(s.id, { color: e.target.value })}
                      style={{ width:30, height:30, borderRadius:5, border:'none', cursor:'pointer', background:'none', flexShrink:0 }}
                    />
                    <button
                      onClick={() => { if (confirm(`¿Eliminar a ${s.name}?`)) removeStreamer(s.id); }}
                      style={{ color:'#ef4444', fontSize:13, padding:'3px 8px', borderRadius:5, background:'none', border:'none', cursor:'pointer' }}
                    >
                      ✕
                    </button>
                  </div>
                ))}
              </div>
              <form onSubmit={handleAddStreamer} style={{ display:'flex', gap:8, flexWrap:'wrap', marginTop:4 }}>
                <input value={newAvatar} onChange={e => setNewAvatar(e.target.value)} placeholder="Emoji" style={{ ...S.input, width:60, textAlign:'center', fontSize:18 }} maxLength="4" />
                <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Nombre" style={{ ...S.input, flex:1, minWidth:100 }} />
                <input value={newId}   onChange={e => setNewId(e.target.value)}   placeholder="ID en Kick" style={{ ...S.input, flex:1, minWidth:100, fontFamily:'monospace' }} />
                <input type="color" value={newColor} onChange={e => setNewColor(e.target.value)} style={{ width:36, height:36, borderRadius:6, border:'none', cursor:'pointer', background:'none' }} />
                <button type="submit" style={S.btnNeon}>Añadir</button>
              </form>
            </section>

            {/* Appearance */}
            <section style={sectionStyle}>
              <h2 style={h2Style}>🎨 Apariencia</h2>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                <div>
                  <label style={S.label}>Color de acento</label>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <input type="color" value={state.accent || '#53fc18'}
                      onChange={e => updateState({ accent: e.target.value })}
                      style={{ width:34, height:34, borderRadius:6, border:'none', cursor:'pointer', background:'none' }} />
                    <span style={{ fontFamily:'monospace', fontSize:13 }}>{state.accent || '#53fc18'}</span>
                  </div>
                </div>
                <div>
                  <label style={S.label}>Título de página</label>
                  <input value={state.pageTitle || ''} onChange={e => updateState({ pageTitle: e.target.value })}
                    style={S.input} placeholder="La Ganga – Dashboard" />
                </div>
                <div>
                  <label style={S.label}>Logo / nombre</label>
                  <input value={state.logoText || ''} onChange={e => updateState({ logoText: e.target.value })}
                    style={S.input} placeholder="LA GANGA" />
                </div>
                <div>
                  <label style={S.label}>Subtítulo</label>
                  <input value={state.subtitle || ''} onChange={e => updateState({ subtitle: e.target.value })}
                    style={S.input} placeholder="Multi-Stream Dashboard" />
                </div>
              </div>
            </section>

            {/* Webhook */}
            <section style={sectionStyle}>
              <h2 style={h2Style}>🔔 Webhook de Discord</h2>
              <p style={pStyle}>
                {/* ⚠️ PON AQUÍ TU URL DE WEBHOOK DE DISCORD */}
                Obtén la URL en: Tu servidor Discord → Canal → ⚙ Configuración → Integraciones → Webhooks → Nuevo Webhook.
              </p>
              <div>
                <label style={S.label}>URL del Webhook</label>
                {/* ⚠️ REEMPLAZA EL PLACEHOLDER CON TU URL: https://discord.com/api/webhooks/ID/TOKEN */}
                <input
                  type="url"
                  value={webhookInput}
                  onChange={e => setWebhookInput(e.target.value)}
                  placeholder="https://discord.com/api/webhooks/ID/TOKEN"
                  style={S.input}
                />
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <button onClick={handleSaveWebhook} style={S.btnNeon}>Guardar</button>
                <button onClick={() => testWebhook(webhookInput)} style={S.btnOutline('var(--neon)')}>Probar</button>
              </div>
            </section>

            {/* Kick API Info */}
            <section style={sectionStyle}>
              <h2 style={h2Style}>🔗 Integración Kick API</h2>
              <p style={pStyle}>
                Para obtener datos en tiempo real (viewers, estado del stream) necesitas autenticarte con
                la API oficial de Kick. Consulta la documentación en{' '}
                <a href="https://github.com/KickEngineering/KickDevDocs" target="_blank" rel="noreferrer"
                   style={{ color:'var(--neon)', textDecoration:'underline' }}>
                  KickDevDocs
                </a>.
                Actualmente se muestran datos simulados como placeholder.
              </p>
              <div style={{ background:'var(--border)', borderRadius:7, padding:'10px 14px', fontSize:12, fontFamily:'monospace', lineHeight:1.8 }}>
                <div style={{ color:'var(--muted)' }}># Endpoint público (requiere OAuth2)</div>
                <div style={{ color:'var(--neon)' }}>GET https://api.kick.com/public/v1/channels</div>
                <div style={{ color:'var(--muted)', marginTop:6 }}># Parámetro</div>
                <div>?broadcaster_username=<span style={{ color:'#facc15' }}>westcol</span></div>
              </div>
            </section>

            {/* Storage */}
            <section style={sectionStyle}>
              <h2 style={h2Style}>💾 Datos locales (LocalStorage)</h2>
              <p style={pStyle}>
                Toda la configuración (streamers, streams activos, colores, webhook) se guarda automáticamente
                en localStorage y persiste entre recargas.
              </p>
              <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                <button onClick={exportConfig} style={S.btnOutline()}>📤 Exportar JSON</button>
                <button onClick={() => importRef.current?.click()} style={S.btnOutline()}>📥 Importar JSON</button>
                <button
                  onClick={() => { if (confirm('¿Borrar todos los datos?')) resetStorage(); }}
                  style={{ ...S.btnOutline('#ef4444'), color:'#ef4444', borderColor:'#7f1d1d' }}
                >
                  🗑 Limpiar todo
                </button>
              </div>
              <input type="file" ref={importRef} accept=".json" onChange={handleImport} style={{ display:'none' }} />
            </section>

            {/* Latency */}
            <section style={sectionStyle}>
              <h2 style={h2Style}>📡 Módulo de Latencia</h2>
              <p style={pStyle}>Mide la latencia hacia los servidores de Kick para saber si el lag es tuyo o de la plataforma.</p>
              <LatencySection />
            </section>

          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       MAIN APP
    ═══════════════════════════════════════════════════════ */
    function App() {
      const { state, showAdmin, showDiscord } = useApp();

      return (
        <div style={{ height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden', background:'var(--darker)' }}>
          <Header />
          <div style={{ display:'flex', flex:1, overflow:'hidden', position:'relative' }}>
            <Sidebar />
            <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden' }}>
              <StreamGrid />
              <Dashboard />
            </div>
            <ChatPanel />
          </div>

          {/* Overlays */}
          <CinemaMode />
          {showDiscord && <DiscordModal />}
          {showAdmin   && <AdminPanel />}
          <Toast />
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       RENDER
    ═══════════════════════════════════════════════════════ */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppProvider><App /></AppProvider>);
  </script>
</body>
</html>
