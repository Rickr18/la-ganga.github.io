name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Kick client secret
        env:
          KICK_CLIENT_SECRET: ${{ secrets.KICK_CLIENT_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import os, sys

          secret = os.environ.get('KICK_CLIENT_SECRET', '')
          placeholder = '__KICK_CLIENT_SECRET__'

          if not secret:
              print('WARNING: KICK_CLIENT_SECRET secret is not configured. '
                    'OAuth token exchange will proceed without a client_secret. '
                    'Add it under Settings → Secrets and variables → Actions.')

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          if placeholder not in content:
              print('WARNING: placeholder not found in index.html – nothing to replace.')
          else:
              content = content.replace(placeholder, secret)
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print('Injection complete. Secret present:', bool(secret))
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
